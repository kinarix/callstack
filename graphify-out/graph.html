<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callstack Codebase Graph</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        #container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #header h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
        }
        #header p {
            margin: 0;
            font-size: 13px;
            opacity: 0.9;
        }
        #network {
            flex: 1;
            background: white;
            border-radius: 8px;
            margin: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        #sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 300px;
            height: 100vh;
            background: white;
            border-left: 1px solid #eee;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
        }
        #sidebar h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            text-transform: uppercase;
            color: #667eea;
            font-weight: 600;
        }
        .node-info {
            font-size: 12px;
            line-height: 1.6;
            color: #333;
        }
        .node-info strong {
            color: #667eea;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-size: 12px;
        }
        .controls button {
            margin: 4px;
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .controls button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1>Callstack Codebase Knowledge Graph</h1>
            <p>551 nodes · 621 edges · 17 communities · Click nodes to explore</p>
        </div>
        <div id="network"></div>
    </div>
    <div id="sidebar">
        <h3>Node Details</h3>
        <div id="nodeInfo" class="node-info">Select a node to view details</div>
    </div>
    <div class="controls">
        <button onclick="resetView()">Reset View</button>
        <button onclick="togglePhysics()">Toggle Physics</button>
    </div>

    <script>
        // Load and prepare data
        const graphData = GRAPH_DATA_PLACEHOLDER;
        
        const nodes = new vis.DataSet(graphData.nodes.map(n => ({
            id: n.id,
            label: n.label,
            title: n.label,
            group: n.file_type || 'unknown',
            color: getColorByType(n.file_type)
        })));

        const edges = new vis.DataSet(graphData.edges.map(e => ({
            from: e.source,
            to: e.target,
            title: e.relation,
            arrows: 'to',
            smooth: { type: 'continuous' },
            color: { opacity: 0.4 }
        })));

        function getColorByType(type) {
            const colors = {
                'code': '#667eea',
                'document': '#10b981',
                'image': '#f59e0b',
                'paper': '#8b5cf6',
                'unknown': '#ccc'
            };
            return colors[type] || colors.unknown;
        }

        const container = document.getElementById('network');
        const data = { nodes, edges };
        const options = {
            physics: {
                enabled: true,
                forceAtlas2Based: {
                    gravitationalConstant: -200,
                    centralGravity: 0.005,
                    springLength: 200
                },
                maxVelocity: 50,
                solver: 'forceAtlas2Based'
            },
            interaction: {
                navigationButtons: true,
                keyboard: true
            }
        };

        const network = new vis.Network(container, data, options);

        network.on('selectNode', function(params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const node = nodes.get(nodeId);
                document.getElementById('nodeInfo').innerHTML = `
                    <strong>${node.label}</strong><br>
                    ID: ${node.id}<br>
                    Type: ${node.group}<br>
                    Connections: ${edges.get({
                        filter: e => e.from === nodeId || e.to === nodeId
                    }).length}
                `;
            }
        });

        function resetView() {
            network.fit();
        }

        function togglePhysics() {
            const isEnabled = network.getOptions().physics.enabled;
            network.setOptions({ physics: { enabled: !isEnabled } });
        }

        network.fit();
    </script>
